<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Secret Number Game</title>
</head>
<body>
    <div class="game-container">
        <h1>Secret Number</h1>
        <p class="stats">Attempts: {{ attempts }} / 7</p>
        
        <p class="message">{{ message }}</p>

        {% if not game_over %}
        <form method="POST">
            <input type="number" name="guess" min="1" max="100" required autofocus>
            <button type="submit">Guess</button>
        </form>
        {% else %}
        <a href="/reset" class="retry-btn">Play Again</a>
        {% endif %}
    </div>
</body>
</html>
